<!DOCTYPE html>

<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memories ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

.slideshow{
    text-align:center;
    margin-top:40px;
}

.slideshow img{
    width:100%;
    max-width:500px;
    height:650px;
    object-fit:cover;

    border-radius:20px;

    box-shadow:0 10px 30px rgba(0,0,0,.3);

    opacity:1;

    transition:
    opacity 1s ease-in-out,
    transform 4s linear;

    transform:scale(1);
}

.slideshow p{
    margin-top:20px;
    color:white;
    font-size:20px;
}

body{

overflow-x:hidden;
overflow-y:auto;

padding-bottom:150px;
}
.gallery{
    width:90%;
    max-width:900px;
    margin:auto;
    padding:50px 0;
    text-align:center;
}

.gallery h1{
    text-align:center;
    color:white;
    margin-bottom:40px;
}
.heart{
    position:fixed;
    bottom:-50px;

    font-size:30px;

    animation:floatHeart 8s linear forwards;

    z-index:999;
}.heart-btn{

position:fixed;

bottom:40px;
right:40px;

width:80px;
height:80px;

display:flex;
justify-content:center;
align-items:center;

font-size:40px;

cursor:pointer;

animation:pulseHeart 1.5s infinite;

z-index:1000;
}

@keyframes pulseHeart{

0%{
transform:scale(1);
}

50%{
transform:scale(1.2);
}

100%{
transform:scale(1);
}

}

@keyframes floatHeart{

from{
    transform:translateY(0);
    opacity:1;
}

to{
    transform:translateY(-120vh);
    opacity:0;
}

}.polaroid{

position:fixed;

width:140px;

background:white;

padding:10px;

border-radius:10px;

box-shadow:0 10px 20px rgba(0,0,0,.2);

text-align:center;

animation:floatPolaroid 4s ease-in-out infinite;
}

.polaroid img{

width:100%;
height:180px;

object-fit:cover;

border-radius:5px;
}

.left-top{
left:170px;
top:120px;
transform:rotate(-8deg);
}

.right-top{
right:120px;
top:120px;
transform:rotate(8deg);
}

.left-bottom{
left:170px;
bottom:40px;
transform:rotate(6deg);
}

.right-bottom{
right:120px;
bottom:40px;
transform:rotate(-6deg);
}
@keyframes floatPolaroid{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(-10px);
}

}
.scroll-indicator{

font-size:45px;

margin-top:10px;

text-align:center;

animation:bounceArrow 1.5s infinite;

color:white;
}

@keyframes bounceArrow{

0%,100%{
transform:translateY(0);
}

50%{
transform:translateY(12px);
}

}
.next-surprise{

display:flex;

flex-direction:column;

align-items:center;

justify-content:center;

margin-top:30px;

margin-bottom:80px;

cursor:pointer;
}

.big-heart{

font-size:80px;

animation:pulse 1.5s infinite;
}
@keyframes pulse{

0%{
transform:scale(1);
}

50%{
transform:scale(1.15);
}

100%{
transform:scale(1);
}

}

.surprise-text{

margin-top:5px;

color:white;

font-size:20px;

font-weight:bold;

text-align:center;

text-shadow:0 2px 10px rgba(0,0,0,.2);
}

@keyframes pulseHeart{

0%{
transform:scale(1);
}

50%{
transform:scale(1.1);
}

100%{
transform:scale(1);
}

}
</style>

</head>

<body>
<div class="polaroid left-top">

<img src="images/photo2.jpg">

<p>💖 Cute Memory</p>

</div>

<div class="polaroid right-top">

<img src="images/photo6.jpg">

<p>✨ Beautiful Smile</p>

</div>
<div class="polaroid left-bottom">

<img src="images/photo4.jpg">

<p>🌸 Sweet Smile</p>

</div>

<div class="polaroid right-bottom">

<img src="images/photo7.jpg">

<p>❤️ Birthday Girl</p>

</div>
<audio id="bgmusic" loop>
<source src="music/birthday.mp3" type="audio/mpeg">
</audio>

<div style="text-align:center;margin-top:20px;">
<button onclick="toggleMusic()">
🎵 Play Music
</button>
</div>

<div class="gallery">

<h1>📸 Beautiful Memories 📸</h1>

<div class="slideshow">

<img id="slideImage"
src="images/photo1.jpg">

<p id="caption">
One of my favourite memories ❤️
</p>
<div class="scroll-indicator">
⬇️
</div>

</div>

<div class="next-surprise"
onclick="location.href='loading.html'">

<div class="big-heart">❤️</div>

<div class="surprise-text">

Click Here For<br>
Another Surprise ✨
</div>


</div>

<script>

function toggleMusic(){

let music =
document.getElementById("bgmusic");

if(music.paused){
music.play();
}
else{
music.pause();
}

}

const photos=[

"images/photo1.jpg",
"images/photo2.jpg",
"images/photo3.jpg",
"images/photo4.jpg",
"images/photo5.jpg",
"images/photo6.jpg",
"images/photo7.jpg",
"images/photo8.jpg"

];

const captions=[

"One of my favourite memories ❤️",
"Your smile always shines ✨",
"Another beautiful moment 🌸",
"Forever memorable 💖",
"Thank you for these memories 🌷",
"Happiness captured 📸",
"One more special moment ❤️",
"The journey continues ✨"

];

let current=0;

function changePhoto(){

const image=document.getElementById("slideImage");
image.style.transform="scale(1)";
image.style.opacity="0";

setTimeout(()=>{

current++;

if(current>=photos.length){
current=0;
}

image.src=photos[current];

document.getElementById("caption").innerText=
captions[current];

image.style.opacity="1";
image.style.transform="scale(1.08)";

},1000);

}

setInterval(changePhoto,3000);
function createHeart(){

const heart=
document.createElement("div");

heart.classList.add("heart");

heart.innerHTML="❤️";

heart.style.left=
Math.random()*100+"vw";

heart.style.fontSize=
(Math.random()*20+20)+"px";

document.body.appendChild(heart);

setTimeout(()=>{
heart.remove();
},8000);

}

setInterval(createHeart,700);

</script>

</body>
</html>
