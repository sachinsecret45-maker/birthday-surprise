<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Our Journey ❤️</title>

<link rel="stylesheet" href="style.css">

<style>

.timeline{
    max-width:900px;

.timeline h1{

    margin-bottom:40px;
}

.memory{
    background:rgba(255,255,255,0.2);
    backdrop-filter:blur(10px);

    padding:20px;
    margin:20px 0;

    border-radius:20px;

    color:white;
}

.memory h2{
    margin-bottom:10px;
}

.next-btn{
    text-align:center;
    margin-top:40px;
}

</style>

</head>

<body>

<div class="timeline">

<h1>📱 A Snapchat Story 💖</h1>

<div class="memory">
<h2>🌸 The Day We Met</h2>
<p>
Write how you both met here...
</p>
</div>

<div class="memory">
<h2>😂 First Funny Moment</h2>
<p>
Write your funniest memory...
</p>
</div>

<div class="memory">
<h2>📸 Favorite Snap</h2>
<p>
Write something special...
</p>
</div>

<div class="memory">
<h2>✨ Today</h2>
<p>
Thank you for being part of my life.
</p>
</div>

<div class="next-btn">
<button onclick="location.href='gallery.html'">
📸 Continue The Journey
</button>
</div>

</div>

</html>
