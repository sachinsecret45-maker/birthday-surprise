<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Last Surprise ❤️</title>

<style>

body{
margin:0;
min-height:100vh;

display:flex;
justify-content:center;
align-items:center;
flex-direction:column;

background:linear-gradient(
135deg,
#ff9a9e,
#fad0c4,
#fbc2eb,
#a18cd1
);

font-family:Poppins,sans-serif;
color:white;
}

h1{
font-size:3rem;
animation:pulse 1s infinite;
}

#count{
font-size:5rem;
font-weight:bold;
margin-top:20px;
}

@keyframes pulse{
50%{
transform:scale(1.1);
}
}

</style>

</head>

<body>

<h1>💖 One Last Surprise 💖</h1>

<div id="count">3</div>

<script>

let count=3;

let timer=setInterval(()=>{

count--;

document.getElementById("count")
.innerText=count;

if(count===0){

clearInterval(timer);

window.location.href=
"collage.html";

}

},1000);

</script>

</body>
</html>
