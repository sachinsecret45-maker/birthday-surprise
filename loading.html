<!DOCTYPE html>

<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>One Last Surprise ❤️</title>

<style>

body{

margin:0;
height:100vh;

display:flex;
justify-content:center;
align-items:center;

background:linear-gradient(
135deg,
#ff9a9e,
#fad0c4,
#fbc2eb,
#a18cd1
);

overflow:hidden;

font-family:Poppins,sans-serif;
color:white;
text-align:center;
}

#cake{

font-size:120px;

animation:pulse 1s infinite;
}

#text{

font-size:2rem;
margin-top:20px;
}

#countdown{

font-size:120px;
font-weight:bold;

margin-top:20px;

animation:pop 1s infinite;
}

#blast{

display:none;

font-size:2rem;

font-weight:bold;

animation:zoom 1s infinite;
}

.confetti{

position:fixed;

top:-20px;

width:12px;
height:12px;

background:white;

animation:fall 4s linear forwards;
}

@keyframes fall{

to{
transform:
translateY(110vh)
rotate(720deg);
}
}

@keyframes pulse{

50%{
transform:scale(1.1);
}
}

@keyframes pop{

50%{
transform:scale(1.2);
}
}

@keyframes zoom{

50%{
transform:scale(1.1);
}
}
</style>

</head>

<body>

<div class="container">

    <div id="cake">🎂</div>

    <h1 id="text">Blow The Candle 🕯️</h1>

    <div id="countdown"></div>

    <div id="blast">🎉🎊✨ HAPPY BIRTHDAY ✨🎊🎉</div>

</div>

<script>

let count = 3;

const countdown =
document.getElementById("countdown");

const blast =
document.getElementById("blast");

countdown.innerHTML = count;

let timer = setInterval(()=>{

count--;

if(count > 0){

countdown.innerHTML = count;

}
else{

clearInterval(timer);

countdown.style.display="none";

document.getElementById("cake")
.innerHTML="🎂💨";

blast.style.display="block";

createConfetti();

setTimeout(()=>{
location.href="friendship.html";
},3000);

}

},1000);

function createConfetti(){

for(let i=0;i<80;i++){

let confetti =
document.createElement("div");

confetti.classList.add("confetti");

confetti.style.left =
Math.random()*100+"vw";

confetti.style.animationDelay =
Math.random()*2+"s";

document.body.appendChild(confetti);

}

}

</script>

</body>
</html>
